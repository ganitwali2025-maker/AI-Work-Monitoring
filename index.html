<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passary Refractories</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.9); color:white; z-index:999999; padding:20px; font-family:monospace; overflow:auto;">
      <h1>Application Error</h1>
      <pre id="error-message"></pre>
    </div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-message').textContent = message + '\n\n' + (error ? error.stack : '');
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-message').textContent = 'Unhandled Rejection: ' + event.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
